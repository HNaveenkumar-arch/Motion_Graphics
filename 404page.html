<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Stackly Air - Airline Booking. The flight you are looking for is missing.">

    <title>404 - Flight Not Found | Stackly Air</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        :root {
            --primary-orange: #f97316;
            --hover-orange: #ea580c;
            --light-orange: #ffedd5;
            --text-dark: #1e293b;
            --text-gray: #64748b;
            --bg-body: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-body);
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
            min-height: 100dvh;
            /* Better for mobile browsers */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1500px;
        }

        .error-bg-glow {
            position: absolute;
            width: 150vw;
            height: 150vw;
            max-width: 1200px;
            max-height: 1200px;
            background: radial-gradient(circle, rgba(249, 115, 22, 0.12) 0%, transparent 60%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
            animation: pulseOrangeGlow 6s ease-in-out infinite alternate;
        }

        @keyframes pulseOrangeGlow {
            0% {
                transform: translate(-50%, -50%) scale(0.9);
                opacity: 0.6;
            }

            100% {
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 1;
            }
        }

        .scrolling-grid {
            position: absolute;
            top: 10%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image:
                linear-gradient(rgba(249, 115, 22, 0.08) 2px, transparent 2px),
                linear-gradient(90deg, rgba(249, 115, 22, 0.08) 2px, transparent 2px);
            background-size: 50px 50px;
            z-index: 0;
            pointer-events: none;
            transform: rotateX(70deg);
            animation: infiniteGridScroll 20s linear infinite;
            mask-image: linear-gradient(to top, rgba(0, 0, 0, 1) 0%, transparent 70%);
            -webkit-mask-image: linear-gradient(to top, rgba(0, 0, 0, 1) 0%, transparent 70%);
        }

        @keyframes infiniteGridScroll {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 0 500px;
            }
        }

        .error-container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 50px 30px;
            width: 90%;
            max-width: 600px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08), inset 0 0 20px rgba(255, 255, 255, 0.5);
            transition: transform 0.1s ease-out;
        }

        .status-badge {
            background: var(--light-orange);
            border: 1px solid rgba(249, 115, 22, 0.2);
            color: var(--primary-orange);
            padding: 8px 18px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(249, 115, 22, 0.1);
        }

        .status-badge i {
            animation: radarPing 2s infinite;
        }

        @keyframes radarPing {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(1.3);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .error-code-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 10px;
        }

        .error-code {
            font-family: 'Montserrat', sans-serif;
            font-size: 9rem;
            font-weight: 900;
            line-height: 1;
            color: var(--primary-orange);
            text-shadow: 4px 4px 0px var(--light-orange), 8px 8px 20px rgba(249, 115, 22, 0.3);
            animation: floatingText 6s ease-in-out infinite;
        }

        .flying-plane {
            position: absolute;
            top: -20px;
            right: -30px;
            font-size: 2.5rem;
            color: var(--text-dark);
            animation: flyAround 8s ease-in-out infinite;
            filter: drop-shadow(0 10px 10px rgba(0, 0, 0, 0.1));
            z-index: 15;
        }

        @keyframes floatingText {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes flyAround {
            0% {
                transform: translate(0, 0) rotate(15deg) scale(1);
            }

            25% {
                transform: translate(20px, -20px) rotate(25deg) scale(1.1);
            }

            50% {
                transform: translate(0px, -40px) rotate(15deg) scale(1);
            }

            75% {
                transform: translate(-20px, -20px) rotate(5deg) scale(0.9);
            }

            100% {
                transform: translate(0, 0) rotate(15deg) scale(1);
            }
        }

        .error-desc {
            color: var(--text-gray);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 35px;
            font-weight: 500;
        }

        .error-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn-base {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 28px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 14px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            flex: 1;
            min-width: 160px;
        }

        .btn-primary {
            background: var(--primary-orange);
            color: white;
            border: 2px solid var(--primary-orange);
            box-shadow: 0 8px 20px rgba(249, 115, 22, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-4px);
            background: var(--hover-orange);
            border-color: var(--hover-orange);
            box-shadow: 0 12px 25px rgba(249, 115, 22, 0.35);
        }

        .btn-primary:hover i {
            transform: translateX(-5px);
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.5);
            color: var(--text-dark);
            border: 2px solid rgba(31, 41, 55, 0.1);
        }

        .btn-outline:hover {
            transform: translateY(-4px);
            background: white;
            border-color: rgba(31, 41, 55, 0.2);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.05);
        }

        .btn-outline:hover i {
            transform: scale(1.1);
        }

        .btn-base i {
            transition: transform 0.3s ease;
        }

        @media (max-width: 768px) {
            .error-code {
                font-size: 6rem;
            }

            .flying-plane {
                font-size: 2rem;
                top: -15px;
                right: -15px;
            }

            .error-container {
                padding: 40px 20px;
            }
        }

        @media (max-width: 480px) {
            .error-container {
                padding: 35px 20px;
                border-radius: 24px;
            }

            .error-code {
                font-size: 5rem;
            }

            .flying-plane {
                font-size: 1.5rem;
                top: -10px;
                right: -10px;
            }

            .status-badge {
                font-size: 0.75rem;
                padding: 6px 14px;
                margin-bottom: 15px;
            }

            .error-desc {
                font-size: 0.95rem;
                margin-bottom: 25px;
            }

            .error-actions {
                flex-direction: column;
                gap: 12px;
            }

            .btn-base {
                width: 100%;
                padding: 14px 20px;
                min-width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="error-bg-glow" id="orangeGlow"></div>
    <div class="scrolling-grid"></div>

    <div class="error-container" id="errorContainer">

        <div class="status-badge"><i class="fa-solid fa-satellite-dish"></i> Radar Signal Lost</div>

        <div class="error-code-wrapper">
            <h1 class="error-code">404</h1>
            <i class="fa-solid fa-plane-departure flying-plane"></i>
        </div>

        <p class="error-desc">Oops! The flight you are looking for has already departed, or the page has vanished from
            our radar.</p>

        <div class="error-actions">
            <a href="javascript:history.back()" class="btn-base btn-primary">
                <i class="fa-solid fa-arrow-left"></i> Go Back
            </a>
            <a href="index.html" class="btn-base btn-outline">
                <i class="fa-solid fa-house"></i> Return Home
            </a>
        </div>

    </div>

    <script>
        const container = document.getElementById('errorContainer');
        const glow = document.getElementById('orangeGlow');

        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth > 768) {
                const halfW = window.innerWidth / 2;
                const halfH = window.innerHeight / 2;

                const xVal = (halfW - e.pageX) / 60;
                const yVal = (halfH - e.pageY) / 60;

                container.style.transform = `rotateY(${xVal * -1}deg) rotateX(${yVal}deg) translateY(-5px)`;
                glow.style.transform = `translate(${-50 + xVal * 0.5}%, ${-50 + yVal * 0.5}%) scale(1)`;
            }
        });

        document.addEventListener('mouseleave', () => {
            if (window.innerWidth > 768) {
                container.style.transform = `rotateY(0deg) rotateX(0deg) translateY(0)`;
                glow.style.transform = `translate(-50%, -50%) scale(1)`;
            }
        });
    </script>

</body>

</html>
