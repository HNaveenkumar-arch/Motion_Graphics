<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Motion Graphics & Animation Agency - Page Not Found">

    <title>404 - Render Failed | Animation Agency</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        :root {
            /* Navy Blue & Orange Theme */
            --primary-orange: #f97316;
            --hover-orange: #ea580c;
            --navy-dark: #020617;
            /* Deep Navy Background */
            --navy-card: rgba(15, 23, 42, 0.75);
            /* Glass Navy */
            --text-light: #f8fafc;
            --text-gray: #94a3b8;
            --glass-border: rgba(249, 115, 22, 0.3);
            /* Orange tinted border */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--navy-dark);
            font-family: 'Inter', sans-serif;
            color: var(--text-light);
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1500px;
        }

        /* Ambient Orange Glow */
        .error-bg-glow {
            position: absolute;
            width: 150vw;
            height: 150vw;
            max-width: 1200px;
            max-height: 1200px;
            background: radial-gradient(circle, rgba(249, 115, 22, 0.15) 0%, transparent 60%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
            animation: pulseOrangeGlow 6s ease-in-out infinite alternate;
        }

        @keyframes pulseOrangeGlow {
            0% {
                transform: translate(-50%, -50%) scale(0.9);
                opacity: 0.6;
            }

            100% {
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 1;
            }
        }

        /* 3D Scrolling Grid (Motion Graphics Vibe) */
        .scrolling-grid {
            position: absolute;
            top: 10%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image:
                linear-gradient(rgba(249, 115, 22, 0.15) 2px, transparent 2px),
                linear-gradient(90deg, rgba(249, 115, 22, 0.15) 2px, transparent 2px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
            transform: rotateX(75deg);
            animation: infiniteGridScroll 15s linear infinite;
            mask-image: linear-gradient(to top, rgba(0, 0, 0, 1) 0%, transparent 70%);
            -webkit-mask-image: linear-gradient(to top, rgba(0, 0, 0, 1) 0%, transparent 70%);
        }

        @keyframes infiniteGridScroll {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 0 600px;
            }
        }

        /* Main Glass Card */
        .error-container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 60px 40px;
            width: 90%;
            max-width: 600px;
            background: var(--navy-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 0 20px rgba(249, 115, 22, 0.05);
            transition: transform 0.1s ease-out;
        }

        .status-badge {
            background: rgba(249, 115, 22, 0.15);
            border: 1px solid rgba(249, 115, 22, 0.4);
            color: var(--primary-orange);
            padding: 8px 20px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(249, 115, 22, 0.2);
        }

        .status-badge i {
            animation: blinker 2s linear infinite;
        }

        @keyframes blinker {
            50% {
                opacity: 0;
            }
        }

        .error-code-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 15px;
        }

        .error-code {
            font-family: 'Montserrat', sans-serif;
            font-size: 9rem;
            font-weight: 900;
            line-height: 1;
            color: transparent;
            -webkit-text-stroke: 2px var(--primary-orange);
            text-shadow: 4px 4px 0px rgba(249, 115, 22, 0.2), 0 0 30px rgba(249, 115, 22, 0.4);
            animation: floatingText 6s ease-in-out infinite;
        }

        /* Floating 3D Cube for Animation Theme */
        .flying-cube {
            position: absolute;
            top: -10px;
            right: -40px;
            font-size: 3rem;
            color: var(--primary-orange);
            animation: floatAndRotate 8s ease-in-out infinite;
            filter: drop-shadow(0 10px 15px rgba(249, 115, 22, 0.3));
            z-index: 15;
        }

        @keyframes floatingText {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes floatAndRotate {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(1);
            }

            25% {
                transform: translate(15px, -20px) rotate(90deg) scale(1.1);
            }

            50% {
                transform: translate(0px, -30px) rotate(180deg) scale(1);
            }

            75% {
                transform: translate(-15px, -15px) rotate(270deg) scale(0.9);
            }

            100% {
                transform: translate(0, 0) rotate(360deg) scale(1);
            }
        }

        .error-desc {
            color: var(--text-gray);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 40px;
            font-weight: 500;
        }

        /* Buttons with Hover Effects */
        .error-actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn-base {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px 30px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            flex: 1;
            min-width: 160px;
        }

        .btn-primary {
            background: var(--primary-orange);
            color: #fff;
            border: 2px solid var(--primary-orange);
            box-shadow: 0 8px 20px rgba(249, 115, 22, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-5px) scale(1.02);
            background: var(--hover-orange);
            border-color: var(--hover-orange);
            box-shadow: 0 15px 30px rgba(249, 115, 22, 0.5);
        }

        .btn-primary:hover i {
            transform: translateX(-5px);
        }

        .btn-outline {
            background: transparent;
            color: var(--primary-orange);
            border: 2px solid var(--primary-orange);
        }

        .btn-outline:hover {
            transform: translateY(-5px) scale(1.02);
            background: var(--primary-orange);
            color: #fff;
            box-shadow: 0 15px 30px rgba(249, 115, 22, 0.3);
        }

        .btn-outline:hover i {
            transform: scale(1.1) rotate(15deg);
        }

        .btn-base i {
            transition: transform 0.3s ease;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .error-code {
                font-size: 7rem;
            }

            .flying-cube {
                font-size: 2.5rem;
                right: -20px;
                top: -10px;
            }

            .error-container {
                padding: 50px 30px;
            }
        }

        @media (max-width: 480px) {
            .error-container {
                padding: 40px 20px;
                border-radius: 20px;
            }

            .error-code {
                font-size: 5.5rem;
                -webkit-text-stroke: 1.5px var(--primary-orange);
            }

            .flying-cube {
                font-size: 2rem;
                right: -15px;
                top: 0px;
            }

            .status-badge {
                font-size: 0.75rem;
                padding: 6px 15px;
                margin-bottom: 20px;
            }

            .error-desc {
                font-size: 0.95rem;
                margin-bottom: 30px;
            }

            .error-actions {
                flex-direction: column;
                gap: 15px;
            }

            .btn-base {
                width: 100%;
                padding: 14px 20px;
            }
        }
    </style>
</head>

<body>

    <div class="error-bg-glow" id="orangeGlow"></div>
    <div class="scrolling-grid"></div>

    <div class="error-container" id="errorContainer">

        <div class="status-badge">
            <i class="fa-solid fa-video-slash"></i> Keyframe Missing
        </div>

        <div class="error-code-wrapper">
            <h1 class="error-code">404</h1>
            <i class="fa-solid fa-cube flying-cube"></i>
        </div>

        <p class="error-desc">Oops! The animation you're looking for didn't render, or the timeline got scrubbed too far
            ahead.</p>

        <div class="error-actions">
            <a href="javascript:history.back()" class="btn-base btn-primary">
                <i class="fa-solid fa-arrow-left"></i> Go Back
            </a>
            <a href="index.html" class="btn-base btn-outline">
                <i class="fa-solid fa-house"></i> Main Sequence
            </a>
        </div>

    </div>

    <script>
        // 3D Parallax effect for desktop users
        const container = document.getElementById('errorContainer');
        const glow = document.getElementById('orangeGlow');

        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth > 768) {
                const halfW = window.innerWidth / 2;
                const halfH = window.innerHeight / 2;

                const xVal = (halfW - e.pageX) / 50; // Adjusted for slightly more pop
                const yVal = (halfH - e.pageY) / 50;

                container.style.transform = `rotateY(${xVal * -1}deg) rotateX(${yVal}deg) translateY(-5px)`;
                glow.style.transform = `translate(${-50 + xVal * 0.5}%, ${-50 + yVal * 0.5}%) scale(1.05)`;
            }
        });

        document.addEventListener('mouseleave', () => {
            if (window.innerWidth > 768) {
                container.style.transform = `rotateY(0deg) rotateX(0deg) translateY(0)`;
                glow.style.transform = `translate(-50%, -50%) scale(1)`;
            }
        });
    </script>

</body>

</html>
